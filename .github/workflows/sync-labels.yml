name: Sync Project Status to Labels

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync status labels and notify Discord
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const projectNumber = 1;
            const owner = 'Cre8Tive-Sync';

            const query = `
              query {
                organization(login: "${owner}") {
                  projectV2(number: ${projectNumber}) {
                    items(first: 100) {
                      nodes {
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2SingleSelectField { name } }
                            }
                          }
                        }
                        content {
                          ... on Issue {
                            number
                            title
                            url
                            labels(first: 10) {
                              nodes { name }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query);
            const items = result.organization.projectV2.items.nodes;
            const statusLabels = ['backlog', 'in-progress', 'in-review', 'done'];

            for (const item of items) {
              const issue = item.content;
              if (!issue?.number) continue;

              const statusField = item.fieldValues.nodes.find(
                f => f?.field?.name === 'Status'
              );
              if (!statusField?.name) continue;

              const newLabel = statusField.name.toLowerCase().replace(/\s+/g, '-');
              const currentLabels = issue.labels.nodes.map(l => l.name);

              if (currentLabels.includes(newLabel)) continue;

              for (const old of currentLabels.filter(l => statusLabels.includes(l))) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: old
                });
              }

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [newLabel]
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo: context.repo.repo,
                  name: newLabel,
                  color: 'ededed'
                });
                await github.rest.issues.addLabels({
                  owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [newLabel]
                });
              }

              const emojiMap = {
                'backlog': '📋',
                'in-progress': '🔄',
                'in-review': '👀',
                'done': '✅'
              };
              const emoji = emojiMap[newLabel] || '🎫';

              await fetch(process.env.DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  content: `${emoji} **${issue.title}** was moved to **${newLabel}**\n🔗 ${issue.url}`
                })
              });
            }
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
