name: Trigger Sync Every 2 Minutes

on:
  workflow_run:
    workflows: ["Trigger Sync Every 2 Minutes"]
    types:
      - completed
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 2 minutes then trigger sync
        run: |
          sleep 120
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-labels.yml/dispatches \
            -d '{"ref":"main"}'
