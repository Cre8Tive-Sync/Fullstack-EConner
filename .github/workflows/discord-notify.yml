name: Notify Discord on Ticket Move

on:
  issues:
    types: [labeled]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🎫 **${{ github.event.issue.title }}** was moved to **${{ github.event.label.name }}**\n🔗 ${{ github.event.issue.html_url }}\"
            }"
